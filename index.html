<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kindo AI | Smart Inventory</title>
    <!-- Configuración para PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kindo AI">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#fbbf24',
                            dark: '#d97706',
                            light: '#fef3c7'
                        },
                        surface: '#030712',
                        panel: '#111827'
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #030712; 
            color: #f9fafb; 
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .scanner-frame {
            position: relative;
            border: 2px solid rgba(251, 191, 36, 0.2);
            border-radius: 2.5rem;
            overflow: hidden;
        }

        #reader video {
            object-fit: cover !important;
            height: 100% !important;
        }

        .scan-anim {
            position: absolute;
            left: 0; top: 0; width: 100%; height: 2px;
            background: #fbbf24;
            box-shadow: 0 0 20px #fbbf24;
            animation: moveScan 3s ease-in-out infinite;
            z-index: 20;
        }

        @keyframes moveScan {
            0%, 100% { top: 10%; opacity: 0.2; }
            50% { top: 90%; opacity: 1; }
        }

        @media print {
            body * { visibility: hidden; }
            #print-area { 
                visibility: visible; 
                position: absolute; 
                left: 0; top: 0; 
                width: 58mm; 
                padding: 4mm;
                background: white !important;
                color: black !important;
                display: flex !important;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }

        input, textarea {
            font-size: 16px !important;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-lg mx-auto h-full flex flex-col relative overflow-hidden">
        
        <!-- Header -->
        <header class="p-6 flex items-center justify-between z-50 no-print">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-brand rounded-2xl flex items-center justify-center shadow-lg shadow-brand/20">
                    <i data-lucide="brain-circuit" class="text-black w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-lg font-extrabold tracking-tight leading-none italic">KINDO <span class="text-brand">AI</span></h1>
                    <p class="text-[9px] text-gray-500 font-bold tracking-widest uppercase">Intelligent Inventory</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleView()" id="nav-btn" class="w-12 h-12 glass rounded-2xl flex items-center justify-center transition-all active:scale-90">
                    <i data-lucide="layout-grid" class="w-5 h-5 text-brand"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-hidden relative flex flex-col no-print px-6">
            
            <!-- VIEW: SCANNER & ACTIONS -->
            <section id="view-scanner" class="flex-1 flex flex-col gap-6 overflow-y-auto pb-10">
                
                <!-- Cam Frame -->
                <div class="scanner-frame shrink-0 bg-black relative h-48 shadow-2xl">
                    <div id="reader" class="h-full"></div>
                    <div id="laser" class="scan-anim hidden"></div>
                    <div id="cam-placeholder" class="absolute inset-0 flex flex-col items-center justify-center glass rounded-3xl">
                        <button onclick="startScanner()" class="bg-brand text-black px-6 py-3 rounded-2xl font-black text-xs shadow-xl flex items-center gap-2">
                            <i data-lucide="camera" class="w-4 h-4"></i> ACTIVAR ESCÁNER
                        </button>
                    </div>
                </div>

                <!-- Dynamic Panel -->
                <div id="action-panel" class="glass rounded-[2.5rem] p-6 shadow-2xl transition-all duration-500">
                    
                    <!-- Search Mode / Main Menu -->
                    <div id="panel-default" class="space-y-4">
                        <div class="relative">
                            <i data-lucide="barcode" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                            <input id="manual-input" type="text" placeholder="Código de barras..." 
                                class="w-full bg-surface border border-white/5 rounded-2xl py-4 pl-12 pr-4 text-sm font-semibold outline-none focus:border-brand/50 transition-all">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="processCode(document.getElementById('manual-input').value)" class="bg-brand/10 text-brand border border-brand/20 font-bold py-4 rounded-2xl text-[10px] uppercase tracking-widest">
                                Buscar Código
                            </button>
                            <button onclick="startManualRegistration()" class="bg-white/5 text-white border border-white/10 font-bold py-4 rounded-2xl text-[10px] uppercase tracking-widest flex items-center justify-center gap-2">
                                <i data-lucide="plus" class="w-3 h-3"></i> Registro Manual
                            </button>
                        </div>
                    </div>

                    <!-- Result Mode -->
                    <div id="panel-result" class="hidden animate-in fade-in slide-in-from-bottom-2">
                        <div class="flex gap-4 mb-5">
                            <div class="w-24 h-24 rounded-2xl overflow-hidden glass border border-brand/20 relative">
                                <img id="res-img" src="" class="w-full h-full object-cover hidden">
                                <div id="res-img-placeholder" class="w-full h-full flex items-center justify-center">
                                    <i data-lucide="package" class="w-8 h-8 text-white/20"></i>
                                </div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="bg-brand/10 text-brand text-[8px] px-2 py-0.5 rounded-full font-black uppercase">Stock: <span id="res-stock">0</span></span>
                                </div>
                                <h3 id="res-name" class="text-xl font-extrabold truncate pr-2">Producto</h3>
                                <p id="res-sku" class="text-[10px] font-mono text-gray-500 tracking-tighter">SKU: 0000</p>
                            </div>
                        </div>
                        <p id="res-desc" class="text-xs text-gray-400 mb-6 italic leading-relaxed">Sin descripción.</p>
                        <div class="flex items-center justify-between mb-6">
                            <span id="res-price" class="text-4xl font-black text-brand tracking-tighter">$0.00</span>
                            <button onclick="resetUI()" class="p-2 text-gray-500 hover:text-white transition-colors"><i data-lucide="refresh-ccw" class="w-5 h-5"></i></button>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="window.print()" class="bg-white text-black font-black py-4 rounded-2xl text-xs flex items-center justify-center gap-2">
                                <i data-lucide="printer" class="w-4 h-4"></i> TICKET
                            </button>
                            <button onclick="deleteProductPrompt()" class="bg-red-500/10 text-red-500 font-bold py-4 rounded-2xl text-xs uppercase">Borrar</button>
                        </div>
                    </div>

                    <!-- Registration Mode -->
                    <div id="panel-form" class="hidden animate-in slide-in-from-bottom-4">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex flex-col">
                                <h3 id="form-title" class="text-brand font-bold text-[10px] uppercase tracking-widest">Nuevo Registro</h3>
                                <p id="form-sku-badge" class="text-[8px] text-gray-500 font-mono"></p>
                            </div>
                            <button onclick="resetUI()" class="text-gray-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                        
                        <!-- AI Image Area -->
                        <div class="mb-5 group relative">
                            <input type="file" id="new-image-input" accept="image/*" capture="environment" class="hidden" onchange="handleImageSelected(this)">
                            <div onclick="document.getElementById('new-image-input').click()" id="image-placeholder" class="h-32 w-full bg-surface border-2 border-dashed border-white/10 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:border-brand/40 transition-all overflow-hidden relative">
                                <i data-lucide="scan-text" class="w-8 h-8 text-brand mb-2"></i>
                                <span class="text-[9px] text-gray-400 font-black uppercase text-center px-4">Escanear Ticket con IA</span>
                                <p class="text-[8px] text-gray-600 mt-1 uppercase">Extrae nombre, precio y descripción</p>
                            </div>
                            <img id="image-preview" class="hidden h-32 w-full rounded-3xl object-cover border border-white/10">
                            
                            <!-- AI Progress Overlay -->
                            <div id="ai-loading" class="hidden absolute inset-0 glass rounded-3xl flex flex-col items-center justify-center z-20">
                                <div class="w-10 h-10 border-4 border-brand/20 border-t-brand rounded-full animate-spin mb-3"></div>
                                <span class="text-[9px] font-black uppercase text-brand animate-pulse text-center">IA Analizando ticket...</span>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <div class="relative">
                                <i data-lucide="tag" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                                <input id="new-name" type="text" placeholder="Nombre completo del producto" class="w-full bg-surface border border-white/5 rounded-2xl py-3 pl-12 pr-4 text-sm outline-none focus:border-brand transition-all">
                            </div>
                            <div class="flex gap-3">
                                <div class="relative flex-1">
                                    <i data-lucide="dollar-sign" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                                    <input id="new-price" type="number" step="0.01" placeholder="Precio" class="w-full bg-surface border border-white/5 rounded-2xl py-3 pl-12 pr-4 text-sm outline-none focus:border-brand">
                                </div>
                                <div class="relative w-28">
                                    <i data-lucide="box" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                                    <input id="new-stock" type="number" placeholder="Stock" class="w-full bg-surface border border-white/5 rounded-2xl py-3 pl-10 pr-4 text-sm outline-none focus:border-brand">
                                </div>
                            </div>
                            <textarea id="new-desc" placeholder="Detalles extraídos del ticket (Marca, cantidad, etc)..." class="w-full bg-surface border border-white/5 rounded-2xl px-4 py-3 text-sm outline-none focus:border-brand h-16 resize-none"></textarea>
                            <button onclick="saveProduct()" class="w-full bg-brand text-black font-black py-4 rounded-2xl shadow-xl shadow-brand/10 text-xs uppercase tracking-widest transition-transform active:scale-95">Guardar en Inventario</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- VIEW: INVENTORY -->
            <section id="view-inventory" class="hidden flex-1 pb-20 overflow-y-auto">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-black italic tracking-tight uppercase">Inventario</h2>
                    <span id="inv-count" class="bg-brand/10 text-brand px-3 py-1 rounded-full text-[10px] font-black">0 ITEMS</span>
                </div>

                <!-- Búsqueda por Nombre -->
                <div class="relative mb-6">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                    <input id="inventory-search" type="text" placeholder="Buscar por nombre o SKU..." 
                        oninput="renderInventory()"
                        class="w-full bg-surface border border-white/5 rounded-2xl py-3 pl-12 pr-4 text-sm outline-none focus:border-brand/50 transition-all">
                </div>

                <div id="inventory-list" class="grid gap-3"></div>
            </section>

        </main>

        <!-- Toast -->
        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] glass px-6 py-3 rounded-2xl text-[10px] font-black shadow-2xl opacity-0 translate-y-4 transition-all pointer-events-none uppercase">
            Notificación
        </div>

    </div>

    <!-- PRINT TICKET -->
    <div id="print-area" class="hidden">
        <div style="font-weight: 800; font-size: 14px; border-bottom: 2px solid black; margin-bottom: 5px; width: 100%; text-align: center; padding-bottom: 4px;">KINDO MALL</div>
        <div id="p-name" style="font-weight: 700; font-size: 13px; margin-bottom: 2px;">PRODUCTO</div>
        <div id="p-price" style="font-weight: 900; font-size: 28px; margin-bottom: 10px;">$0.00</div>
        <svg id="p-barcode"></svg>
        <div id="p-sku" style="font-size: 9px; font-family: monospace; margin-top: 5px;">00000000</div>
    </div>

    <script>
        const apiKey = ""; 
        let inventory = JSON.parse(localStorage.getItem('kindo_ai_db')) || [];
        let html5QrCode;
        let currentMode = 'scanner';
        let activeCode = null;
        let activeImageData = null;

        // --- Core Functions ---

        async function startScanner() {
            try {
                html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 220 }, onScanSuccess);
                document.getElementById('cam-placeholder').classList.add('hidden');
                document.getElementById('laser').classList.remove('hidden');
            } catch (err) {
                showToast("Cámara no disponible");
            }
        }

        function onScanSuccess(code) {
            if (code === activeCode) return;
            activeCode = code;
            if (navigator.vibrate) navigator.vibrate(80);
            processCode(code);
        }

        function processCode(code) {
            if(!code) return showToast("Escribe un código");
            const p = inventory.find(x => x.sku.toLowerCase() === code.toLowerCase());
            hideAllPanels();
            if(p) showResult(p);
            else showForm(code, false);
        }

        function startManualRegistration() {
            const manualSKU = "M-" + Date.now().toString().slice(-6);
            hideAllPanels();
            showForm(manualSKU, true);
        }

        function showResult(p) {
            document.getElementById('panel-result').classList.remove('hidden');
            document.getElementById('res-name').innerText = p.name;
            document.getElementById('res-desc').innerText = p.desc;
            document.getElementById('res-price').innerText = '$' + parseFloat(p.price).toFixed(2);
            document.getElementById('res-sku').innerText = 'SKU: ' + p.sku;
            document.getElementById('res-stock').innerText = p.stock || '0';
            
            const imgEl = document.getElementById('res-img');
            const placeholderEl = document.getElementById('res-img-placeholder');
            if(p.image) {
                imgEl.src = p.image;
                imgEl.classList.remove('hidden');
                placeholderEl.classList.add('hidden');
            } else { 
                imgEl.classList.add('hidden'); 
                placeholderEl.classList.remove('hidden');
            }

            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-price').innerText = '$' + parseFloat(p.price).toFixed(2);
            document.getElementById('p-sku').innerText = p.sku;
            JsBarcode("#p-barcode", p.sku, { format: "CODE128", width: 2, height: 45, displayValue: false });
        }

        function showForm(code, isManual) {
            activeCode = code;
            document.getElementById('panel-form').classList.remove('hidden');
            document.getElementById('form-title').innerText = isManual ? "Registro Manual" : "Escaneado Nuevo";
            document.getElementById('form-sku-badge').innerText = "COD: " + code;
        }

        // --- AI Extraction ---

        async function handleImageSelected(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    activeImageData = e.target.result;
                    document.getElementById('image-preview').src = activeImageData;
                    document.getElementById('image-preview').classList.remove('hidden');
                    document.getElementById('image-placeholder').classList.add('hidden');
                    
                    await analyzeWithAI(activeImageData.split(',')[1]);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function analyzeWithAI(base64Image) {
            const loading = document.getElementById('ai-loading');
            loading.classList.remove('hidden');

            // Prompt mejorado para ser más específico con tickets
            const prompt = `Analiza esta imagen de un ticket o etiqueta de producto. 
            Debes extraer TODA la información disponible:
            1. name: El nombre comercial completo del producto.
            2. price: Solo el valor numérico del precio (ej: 15.50).
            3. description: Detalles adicionales como marca, peso, sabor, o cantidad si aparecen en el ticket.
            Responde ESTRICTAMENTE en este formato JSON:
            {"name": "...", "price": 0.0, "description": "..."}`;
            
            const payload = {
                contents: [{
                    role: "user",
                    parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64Image } }]
                }]
            };

            let retries = 0;
            const maxRetries = 3;

            async function callGemini() {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    const jsonStr = text.replace(/```json|```/g, '').trim();
                    const result = JSON.parse(jsonStr);

                    if(result.name) document.getElementById('new-name').value = result.name;
                    if(result.price) document.getElementById('new-price').value = result.price;
                    if(result.description) document.getElementById('new-desc').value = result.description;
                    
                    showToast("IA: Información completada");
                } catch (err) {
                    if (retries < maxRetries) {
                        retries++;
                        await new Promise(r => setTimeout(r, 1000));
                        return callGemini();
                    }
                    showToast("La IA no pudo leer los datos");
                } finally {
                    loading.classList.add('hidden');
                }
            }
            await callGemini();
        }

        // --- Database & UI Logic ---

        function saveProduct() {
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            const stock = document.getElementById('new-stock').value;
            const desc = document.getElementById('new-desc').value;

            if(!name || !price) return showToast("Falta nombre o precio");

            const product = {
                sku: activeCode,
                name,
                price: parseFloat(price),
                stock: stock || 0,
                desc: desc || 'Sin detalles',
                image: activeImageData,
                id: Date.now()
            };

            // Evitar duplicados por SKU
            inventory = inventory.filter(p => p.sku !== activeCode);
            inventory.unshift(product);
            localStorage.setItem('kindo_ai_db', JSON.stringify(inventory));
            
            showToast("Producto Guardado");
            const savedProduct = {...product};
            resetUI();
            showResult(savedProduct);
        }

        function deleteProductPrompt() {
            if(confirm("¿Eliminar este producto permanentemente?")) {
                inventory = inventory.filter(x => x.sku !== activeCode);
                localStorage.setItem('kindo_ai_db', JSON.stringify(inventory));
                showToast("Eliminado");
                resetUI();
            }
        }

        function toggleView() {
            const scanView = document.getElementById('view-scanner');
            const invView = document.getElementById('view-inventory');
            const btn = document.getElementById('nav-btn');
            if(currentMode === 'scanner') {
                scanView.classList.add('hidden');
                invView.classList.remove('hidden');
                btn.innerHTML = '<i data-lucide="camera" class="w-5 h-5 text-brand"></i>';
                currentMode = 'inventory';
                renderInventory();
            } else {
                scanView.classList.remove('hidden');
                invView.classList.add('hidden');
                btn.innerHTML = '<i data-lucide="layout-grid" class="w-5 h-5 text-brand"></i>';
                currentMode = 'scanner';
            }
            lucide.createIcons();
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            const query = document.getElementById('inventory-search').value.toLowerCase();
            
            const filtered = inventory.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.sku.toLowerCase().includes(query)
            );

            document.getElementById('inv-count').innerText = `${filtered.length} ITEMS`;
            
            list.innerHTML = filtered.length ? filtered.map(p => `
                <div onclick="openProduct('${p.sku}')" class="glass p-4 rounded-3xl flex gap-4 items-center active:scale-95 transition-all">
                    <div class="w-12 h-12 rounded-2xl bg-surface overflow-hidden shrink-0 border border-white/5">
                        ${p.image ? `<img src="${p.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center opacity-10"><i data-lucide="package" class="w-6 h-6"></i></div>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-extrabold text-[11px] truncate uppercase tracking-tight">${p.name}</h4>
                        <div class="flex items-center gap-2">
                            <p class="text-[8px] font-mono text-gray-500">${p.sku}</p>
                            <span class="text-[8px] font-black text-brand/60 uppercase">Stock: ${p.stock}</span>
                        </div>
                    </div>
                    <p class="font-black text-white text-sm tracking-tighter">$${parseFloat(p.price).toFixed(2)}</p>
                </div>
            `).join('') : '<div class="py-20 text-center opacity-20 text-[10px] font-black tracking-widest uppercase italic">No se encontraron productos</div>';
            lucide.createIcons();
        }

        function openProduct(sku) { toggleView(); processCode(sku); }
        
        function hideAllPanels() {
            document.getElementById('panel-default').classList.add('hidden');
            document.getElementById('panel-result').classList.add('hidden');
            document.getElementById('panel-form').classList.add('hidden');
        }

        function resetUI() {
            activeCode = null;
            activeImageData = null;
            hideAllPanels();
            document.getElementById('panel-default').classList.remove('hidden');
            document.getElementById('manual-input').value = '';
            document.getElementById('new-name').value = '';
            document.getElementById('new-price').value = '';
            document.getElementById('new-stock').value = '';
            document.getElementById('new-desc').value = '';
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('image-placeholder').classList.remove('hidden');
            document.getElementById('new-image-input').value = "";
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-4'), 2500);
        }

        window.onload = () => { lucide.createIcons(); };
    </script>
</body>
</html>
