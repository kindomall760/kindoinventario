<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINDO | Cloud Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; color: #000; }
        .input-minimal { border-bottom: 1px solid #eee; padding: 12px 0; background: transparent; width: 100%; transition: 0.2s; }
        .input-minimal:focus { border-color: #000; outline: none; }
        .btn-primary { background: #000; color: #fff; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 16px; font-size: 10px; }
        #reader video { object-fit: cover !important; }
    </style>
</head>
<body class="antialiased overflow-hidden fixed w-full h-full">

    <div class="max-w-md mx-auto h-full flex flex-col bg-white shadow-2xl relative">
        
        <header class="px-6 py-6 border-b border-gray-100 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tighter">KINDO®</h1>
                <div class="flex items-center gap-2">
                    <span id="sync-status" class="w-1.5 h-1.5 rounded-full bg-red-500"></span>
                    <p class="text-[8px] font-bold uppercase tracking-widest text-gray-400">Cloud Terminal</p>
                </div>
            </div>
            <button onclick="toggleView()" class="px-4 py-2 bg-gray-50 rounded-full text-[9px] font-bold uppercase tracking-widest flex items-center gap-2">
                <span id="nav-label">Archivo</span>
                <i id="nav-icon" data-lucide="database" class="w-3 h-3"></i>
            </button>
        </header>

        <main class="flex-1 overflow-y-auto">
            <!-- VISTA SCANNER -->
            <section id="view-scanner" class="p-0">
                <div class="h-64 bg-black relative flex items-center justify-center overflow-hidden">
                    <div id="reader" class="w-full h-full"></div>
                    <div id="cam-placeholder" class="absolute z-10 text-center">
                        <button onclick="startScanner()" class="border-2 border-white text-white px-8 py-3 text-[10px] font-bold uppercase">Activar Lente</button>
                    </div>
                </div>

                <div class="p-8 space-y-8">
                    <div id="panel-default">
                        <label class="text-[9px] font-bold uppercase tracking-widest text-gray-400">Búsqueda / Entrada</label>
                        <div class="relative">
                            <input id="manual-input" type="text" placeholder="SKU o Código..." class="input-minimal text-xl font-bold uppercase">
                            <button onclick="processCode(document.getElementById('manual-input').value)" class="absolute right-0 bottom-3"><i data-lucide="arrow-right"></i></button>
                        </div>
                    </div>

                    <div id="panel-result" class="hidden animate-in fade-in slide-in-from-bottom-2">
                        <div class="flex justify-between items-start mb-6">
                            <div class="space-y-1">
                                <span id="res-sku" class="text-[9px] bg-black text-white px-2 py-0.5 font-mono font-bold">SKU-000</span>
                                <h2 id="res-name" class="text-3xl font-black tracking-tighter uppercase leading-none pt-2">PRODUCTO</h2>
                            </div>
                            <img id="res-img" class="w-20 h-20 object-cover bg-gray-50 rounded hidden">
                        </div>
                        <div class="grid grid-cols-2 gap-8 py-6 border-y border-gray-100 mb-6">
                            <div>
                                <span class="text-[8px] font-bold text-gray-400 uppercase">Precio</span>
                                <p id="res-price" class="text-3xl font-light">$0.00</p>
                            </div>
                            <div class="text-right">
                                <span class="text-[8px] font-bold text-gray-400 uppercase">Stock</span>
                                <p id="res-stock" class="text-3xl font-light">0</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openEditMode()" class="flex-1 border border-black py-4 text-[10px] font-bold uppercase">Editar</button>
                            <button onclick="resetUI()" class="px-6 border border-gray-100 text-[10px] font-bold">X</button>
                        </div>
                    </div>

                    <div id="panel-form" class="hidden space-y-6">
                        <h3 class="text-lg font-black uppercase">Ficha Técnica</h3>
                        <input id="new-name" type="text" placeholder="Nombre Comercial" class="input-minimal font-bold">
                        <div class="grid grid-cols-2 gap-4">
                            <input id="new-price" type="number" step="0.01" placeholder="Precio $" class="input-minimal font-mono">
                            <input id="new-stock" type="number" placeholder="Stock" class="input-minimal font-mono">
                        </div>
                        <div class="py-4 border-2 border-dashed border-gray-100 rounded text-center">
                            <input type="file" id="image-input" class="hidden" onchange="handleImage(this)" accept="image/*" capture="environment">
                            <button onclick="document.getElementById('image-input').click()" class="text-[9px] font-bold uppercase flex flex-col items-center gap-2">
                                <i data-lucide="camera" class="w-6 h-6"></i> Escanear con IA
                            </button>
                            <div id="ai-loading" class="hidden mt-2 text-[8px] font-bold animate-pulse">Analizando Visión...</div>
                        </div>
                        <button onclick="saveProduct()" class="w-full btn-primary">Guardar en Cloud</button>
                    </div>
                </div>
            </section>

            <!-- VISTA ARCHIVO -->
            <section id="view-inventory" class="hidden h-full flex flex-col">
                <div class="p-8 border-b">
                    <h2 class="text-3xl font-black tracking-tighter">ARCHIVO</h2>
                    <input type="text" id="inv-search" oninput="renderArchive()" placeholder="Buscar..." class="input-minimal mt-4">
                </div>
                <div id="inv-list" class="flex-1 overflow-y-auto px-8 divide-y divide-gray-50 pb-20"></div>
            </section>
        </main>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black text-white px-8 py-4 text-[9px] font-bold uppercase tracking-widest opacity-0 transition-all pointer-events-none z-50">Toast</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kindo-inventory';
        const apiKey = ""; 

        let user = null;
        let inventory = [];
        let scanner = null;
        let activeCode = null;
        let activeImg = null;

        onAuthStateChanged(auth, u => {
            user = u;
            if (u) {
                document.getElementById('sync-status').className = 'w-1.5 h-1.5 rounded-full bg-green-500';
                subscribe();
            }
        });

        async function init() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
            lucide.createIcons();
        }

        function subscribe() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
            onSnapshot(q, snap => {
                inventory = snap.docs.map(d => ({...d.data(), id: d.id}));
                renderArchive();
            });
        }

        window.startScanner = async () => {
            scanner = new Html5Qrcode("reader");
            await scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (code) => {
                if (code !== activeCode) {
                    if (navigator.vibrate) navigator.vibrate(50);
                    processCode(code);
                }
            });
            document.getElementById('cam-placeholder').classList.add('hidden');
        };

        window.processCode = (code) => {
            activeCode = code.toUpperCase();
            const p = inventory.find(x => x.sku === activeCode);
            hidePanels();
            if (p) showResult(p);
            else showForm(activeCode);
        };

        function showResult(p) {
            document.getElementById('panel-result').classList.remove('hidden');
            document.getElementById('res-name').innerText = p.name;
            document.getElementById('res-sku').innerText = p.sku;
            document.getElementById('res-price').innerText = `$${p.price}`;
            document.getElementById('res-stock').innerText = p.stock;
            if (p.image) {
                const img = document.getElementById('res-img');
                img.src = p.image;
                img.classList.remove('hidden');
            }
        }

        function showForm(code) {
            document.getElementById('panel-form').classList.remove('hidden');
            activeCode = code;
        }

        window.handleImage = (input) => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                activeImg = e.target.result;
                const base64 = activeImg.split(',')[1];
                await analyzeIA(base64);
            };
            reader.readAsDataURL(file);
        };

        async function analyzeIA(base64) {
            const loader = document.getElementById('ai-loading');
            loader.classList.remove('hidden');
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "Analiza la etiqueta. Devuelve solo un JSON: {\"name\": string, \"price\": number}" },
                            { inlineData: { mimeType: "image/png", data: base64 } }
                        ]}],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await res.json();
                const clean = JSON.parse(data.candidates[0].content.parts[0].text);
                if (clean.name) document.getElementById('new-name').value = clean.name;
                if (clean.price) document.getElementById('new-price').value = clean.price;
                toast("IA: Datos extraídos");
            } catch (e) {
                toast("Error en IA");
            } finally { loader.classList.add('hidden'); }
        }

        window.saveProduct = async () => {
            const name = document.getElementById('new-name').value;
            const price = parseFloat(document.getElementById('new-price').value);
            const stock = parseInt(document.getElementById('new-stock').value) || 0;
            if (!name || isNaN(price)) return toast("Faltan datos");
            
            const sku = activeCode || "SKU-" + Math.random().toString(36).substr(2,6).toUpperCase();
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', sku), {
                sku, name, price, stock, image: activeImg, updatedAt: new Date().toISOString()
            }, { merge: true });
            toast("Sincronizado");
            resetUI();
        };

        window.toggleView = () => {
            const scan = document.getElementById('view-scanner');
            const inv = document.getElementById('view-inventory');
            const isScan = !scan.classList.contains('hidden');
            scan.classList.toggle('hidden', isScan);
            inv.classList.toggle('hidden', !isScan);
            document.getElementById('nav-label').innerText = isScan ? "Scanner" : "Archivo";
            lucide.createIcons();
        };

        window.renderArchive = () => {
            const search = document.getElementById('inv-search').value.toLowerCase();
            const list = document.getElementById('inv-list');
            const items = inventory.filter(i => i.name.toLowerCase().includes(search) || i.sku.toLowerCase().includes(search));
            list.innerHTML = items.map(i => `
                <div onclick="processCode('${i.sku}')" class="py-6 flex justify-between items-center active:bg-gray-50">
                    <div>
                        <span class="text-[8px] font-bold bg-black text-white px-1 font-mono">${i.sku}</span>
                        <h4 class="font-bold uppercase tracking-tight text-sm">${i.name}</h4>
                        <p class="text-[10px] text-gray-400">Stock: ${i.stock}</p>
                    </div>
                    <p class="font-black text-sm">$${i.price}</p>
                </div>
            `).join('');
        };

        function hidePanels() {
            ['panel-default', 'panel-result', 'panel-form'].forEach(id => document.getElementById(id).classList.add('hidden'));
        }

        window.resetUI = () => {
            activeCode = null; activeImg = null;
            hidePanels();
            document.getElementById('panel-default').classList.remove('hidden');
            ['manual-input', 'new-name', 'new-price', 'new-stock'].forEach(id => document.getElementById(id).value = '');
        };

        function toast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.opacity = "1";
            setTimeout(() => t.style.opacity = "0", 2500);
        }

        init();
    </script>
</body>
</html>
