<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINDO | Inventory System</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <meta name="apple-mobile-web-app-title" content="Kindo">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: '#ffffff',
                        content: '#000000',
                        muted: '#666666',
                        border: '#e5e5e5',
                        accent: '#171717'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #ffffff; 
            color: #000000; 
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            position: fixed;
            width: 100%;
            height: 100%;
            font-feature-settings: "ss01", "ss02", "cv01";
        }
        
        .scanner-container {
            position: relative;
            background: #f4f4f4;
            overflow: hidden;
        }

        #reader {
            width: 100% !important;
            border: none !important;
        }

        #reader video {
            object-fit: cover !important;
            filter: grayscale(100%) contrast(110%);
        }

        .scan-guide {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 1px;
            background: #000000;
            z-index: 30;
            opacity: 0.2;
        }

        .input-minimal {
            border-bottom: 1px solid #e5e5e5;
            border-radius: 0;
            padding: 0.75rem 0;
            transition: border-color 0.2s;
            background: transparent;
        }
        .input-minimal:focus {
            border-color: #000000;
            outline: none;
        }

        .btn-action {
            @apply bg-black text-white font-bold py-4 text-[10px] uppercase tracking-widest transition-all active:scale-[0.98];
        }

        @media print {
            body * { visibility: hidden; }
            #print-area { 
                visibility: visible; 
                position: absolute; 
                left: 0; top: 0; 
                width: 58mm; 
                padding: 2mm;
                background: white !important;
                display: flex !important;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-md mx-auto h-full flex flex-col relative bg-white border-x border-gray-50">
        
        <!-- Header -->
        <header class="px-8 py-8 flex items-end justify-between z-50 no-print border-b border-gray-100 bg-white/80 backdrop-blur-md">
            <div>
                <h1 class="text-xl font-bold tracking-tighter leading-none">KINDO®</h1>
                <p class="text-[10px] text-muted font-medium mt-1 tracking-widest uppercase">Inventory Terminal v2.0</p>
            </div>
            <div class="flex gap-4">
                <button onclick="toggleView()" id="nav-btn" class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest">
                    <span id="nav-label">Archivo</span>
                    <i data-lucide="menu" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <!-- Main -->
        <main class="flex-1 overflow-hidden relative flex flex-col no-print">
            
            <!-- VIEW: SCANNER -->
            <section id="view-scanner" class="flex-1 flex flex-col overflow-y-auto">
                <div class="scanner-container shrink-0 h-64 relative">
                    <div id="reader"></div>
                    <div id="laser" class="scan-guide hidden"></div>
                    <div id="cam-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50">
                        <button onclick="startScanner()" class="border border-black px-6 py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all">
                            Activar Sensor Óptico
                        </button>
                    </div>
                </div>

                <div id="action-panel" class="px-8 py-8 flex-1 flex flex-col">
                    <!-- Default Screen -->
                    <div id="panel-default" class="space-y-8">
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold uppercase tracking-widest text-muted">Consulta Manual</label>
                            <input id="manual-input" type="text" placeholder="Ingresar SKU..." class="w-full input-minimal text-lg font-medium">
                        </div>
                        
                        <div class="flex flex-col gap-3">
                            <button onclick="processCode(document.getElementById('manual-input').value)" class="btn-action">Consultar Registro</button>
                            <button onclick="startManualRegistration()" class="border border-gray-200 text-black text-[10px] font-bold py-4 uppercase tracking-widest">Alta Manual</button>
                        </div>
                    </div>

                    <!-- Result Screen -->
                    <div id="panel-result" class="hidden space-y-6">
                        <div class="flex justify-between items-start">
                            <div class="space-y-1">
                                <span id="res-sku" class="font-mono text-[9px] text-muted">SKU: 00000</span>
                                <h3 id="res-name" class="text-2xl font-bold tracking-tighter uppercase leading-tight">Producto</h3>
                                <div class="flex gap-2">
                                    <span id="res-category" class="text-[8px] border border-gray-100 px-2 py-0.5 font-bold uppercase text-muted">General</span>
                                </div>
                            </div>
                            <div class="w-20 h-20 border border-gray-100 p-1 bg-gray-50">
                                <img id="res-img" src="" class="w-full h-full object-cover grayscale hidden">
                                <div id="res-img-placeholder" class="w-full h-full flex items-center justify-center text-gray-200">
                                    <i data-lucide="package" class="w-6 h-6"></i>
                                </div>
                            </div>
                        </div>

                        <div class="border-y border-gray-100 py-6 grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[8px] font-bold text-muted uppercase tracking-widest block mb-1">Precio</label>
                                <p id="res-price" class="text-3xl font-light tracking-tighter">$0.00</p>
                            </div>
                            <div class="text-right">
                                <label class="text-[8px] font-bold text-muted uppercase tracking-widest block mb-1">Stock</label>
                                <p id="res-stock" class="text-3xl font-light tracking-tighter">0</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="window.print()" class="btn-action">Imprimir</button>
                            <button onclick="openEditMode()" class="border border-gray-200 text-black text-[10px] font-bold py-4 uppercase tracking-widest">Editar</button>
                        </div>
                        <button onclick="resetUI()" class="w-full text-[9px] font-bold text-muted uppercase tracking-widest">Volver</button>
                    </div>

                    <!-- Registration/Edit Form -->
                    <div id="panel-form" class="hidden">
                        <div class="mb-6">
                            <h3 id="form-title" class="text-xs font-bold uppercase tracking-widest mb-1">Registro de Item</h3>
                            <p id="form-sku-badge" class="font-mono text-[10px] text-muted"></p>
                        </div>

                        <div class="space-y-5">
                            <input id="new-name" type="text" placeholder="Nombre Comercial" class="w-full input-minimal text-sm">
                            <input id="new-category" type="text" placeholder="Categoría (ej: Bebidas, Textil...)" class="w-full input-minimal text-xs text-muted">
                            
                            <div class="flex gap-6">
                                <div class="flex-1">
                                    <label class="text-[8px] font-bold uppercase text-muted">Precio Unitario</label>
                                    <input id="new-price" type="number" step="0.01" class="w-full input-minimal text-sm">
                                </div>
                                <div class="w-20">
                                    <label class="text-[8px] font-bold uppercase text-muted">Stock</label>
                                    <input id="new-stock" type="number" class="w-full input-minimal text-sm text-center">
                                </div>
                            </div>

                            <!-- AI OCR Option -->
                            <div class="pt-2">
                                <input type="file" id="new-image-input" accept="image/*" capture="environment" class="hidden" onchange="handleImageSelected(this)">
                                <button onclick="document.getElementById('new-image-input').click()" class="w-full border border-dashed border-gray-300 py-3 text-[9px] font-bold uppercase tracking-widest hover:border-black">
                                    Escanear Ticket con IA
                                </button>
                                <div id="ai-loading" class="hidden pt-2 text-center">
                                    <span class="text-[8px] font-bold animate-pulse uppercase">Analizando ticket (Rotado)...</span>
                                </div>
                            </div>

                            <div class="flex gap-3 pt-4">
                                <button onclick="saveProduct()" class="flex-1 btn-action">Confirmar</button>
                                <button onclick="resetUI()" class="px-6 border border-gray-200 text-[10px] font-bold uppercase">X</button>
                            </div>
                            <button id="btn-delete" onclick="deleteProductPrompt()" class="hidden w-full text-red-600 text-[9px] font-bold uppercase tracking-widest pt-2">Eliminar Definitivamente</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- VIEW: INVENTORY LIST -->
            <section id="view-inventory" class="hidden flex-1 flex flex-col bg-white">
                <div class="px-8 pt-4 pb-6 border-b border-gray-100">
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <h2 class="text-3xl font-bold tracking-tighter">ARCHIVO</h2>
                            <p id="inv-total-value" class="text-[10px] font-mono text-muted uppercase mt-1">Valor: $0.00</p>
                        </div>
                        <button onclick="exportCSV()" class="text-[9px] font-bold underline uppercase tracking-widest">Exportar CSV</button>
                    </div>
                    <input id="inventory-search" type="text" placeholder="Filtrar Archivo..." oninput="renderInventory()" class="w-full input-minimal text-sm">
                </div>
                <div id="inventory-list" class="flex-1 overflow-y-auto divide-y divide-gray-50 px-8"></div>
            </section>

        </main>

        <!-- Toast -->
        <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 z-[100] bg-black text-white px-6 py-3 text-[9px] font-bold tracking-widest uppercase opacity-0 translate-y-4 transition-all pointer-events-none">
            Notification
        </div>
    </div>

    <!-- PRINT AREA -->
    <div id="print-area" class="hidden">
        <div style="font-weight: 700; font-size: 14px; margin-bottom: 10px;">KINDO SYSTEM</div>
        <div style="border-top: 1px solid black; border-bottom: 1px solid black; padding: 5px 0; width: 100%; margin-bottom: 10px;">
            <div id="p-name" style="font-size: 10px; text-transform: uppercase;">PRODUCT</div>
            <div id="p-price" style="font-weight: 700; font-size: 20px;">$0.00</div>
        </div>
        <svg id="p-barcode"></svg>
        <div id="p-sku" style="font-size: 8px; font-family: 'JetBrains Mono';">SKU-000</div>
    </div>

    <script>
        const apiKey = ""; 
        let inventory = JSON.parse(localStorage.getItem('kindo_pro_db')) || [];
        let html5QrCode;
        let currentMode = 'scanner';
        let activeCode = null;
        let activeImageData = null;
        let isEditing = false;

        async function startScanner() {
            try {
                html5QrCode = new Html5Qrcode("reader");
                const config = { 
                    fps: 20, 
                    qrbox: { width: 280, height: 140 },
                    formatsToSupport: [ 
                        Html5QrcodeSupportedFormats.EAN_13, 
                        Html5QrcodeSupportedFormats.UPC_A, 
                        Html5QrcodeSupportedFormats.CODE_128
                    ]
                };
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                document.getElementById('cam-placeholder').classList.add('hidden');
                document.getElementById('laser').classList.remove('hidden');
            } catch (err) {
                showToast("Falla de Cámara");
            }
        }

        function onScanSuccess(code) {
            if (code === activeCode) return;
            activeCode = code;
            if (navigator.vibrate) navigator.vibrate(40);
            processCode(code);
        }

        function processCode(code) {
            if(!code) return;
            const p = inventory.find(x => x.sku.toLowerCase() === code.toLowerCase());
            hideAllPanels();
            if(p) showResult(p);
            else showForm(code, false);
        }

        function showResult(p) {
            activeCode = p.sku;
            document.getElementById('panel-result').classList.remove('hidden');
            document.getElementById('res-name').innerText = p.name;
            document.getElementById('res-price').innerText = '$' + parseFloat(p.price).toFixed(2);
            document.getElementById('res-sku').innerText = 'SKU: ' + p.sku;
            document.getElementById('res-stock').innerText = p.stock || '0';
            document.getElementById('res-category').innerText = p.category || 'General';
            
            const imgEl = document.getElementById('res-img');
            const placeholderEl = document.getElementById('res-img-placeholder');
            if(p.image) {
                imgEl.src = p.image;
                imgEl.classList.remove('hidden');
                placeholderEl.classList.add('hidden');
            } else { 
                imgEl.classList.add('hidden'); 
                placeholderEl.classList.remove('hidden');
            }

            // Print prep
            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-price').innerText = '$' + parseFloat(p.price).toFixed(2);
            document.getElementById('p-sku').innerText = p.sku;
            JsBarcode("#p-barcode", p.sku, { format: "CODE128", width: 1.5, height: 35, displayValue: false });
        }

        function showForm(code, manual = false) {
            isEditing = false;
            activeCode = code;
            hideAllPanels();
            document.getElementById('panel-form').classList.remove('hidden');
            document.getElementById('form-title').innerText = manual ? "Alta Manual" : "Registro Nuevo";
            document.getElementById('form-sku-badge').innerText = code || "PENDIENTE";
            document.getElementById('btn-delete').classList.add('hidden');
        }

        function openEditMode() {
            const p = inventory.find(x => x.sku === activeCode);
            if(!p) return;
            isEditing = true;
            hideAllPanels();
            document.getElementById('panel-form').classList.remove('hidden');
            document.getElementById('form-title').innerText = "Editar Registro";
            document.getElementById('new-name').value = p.name;
            document.getElementById('new-price').value = p.price;
            document.getElementById('new-stock').value = p.stock;
            document.getElementById('new-category').value = p.category || '';
            document.getElementById('btn-delete').classList.remove('hidden');
        }

        async function handleImageSelected(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    activeImageData = e.target.result;
                    await analyzeWithAI(activeImageData.split(',')[1]);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function analyzeWithAI(base64Image) {
            const loading = document.getElementById('ai-loading');
            loading.classList.remove('hidden');
            
            // Prompt mejorado para tickets rotados como el enviado por el usuario
            const prompt = `Analiza esta etiqueta de inventario. Nota: El texto puede estar rotado 90 grados. 
            Busca:
            1. El nombre del producto (ej: "HYL VW286...").
            2. El precio (ej: "800.00").
            3. El SKU/Código (el número grande junto al código de barras, ej: "21857").
            
            Responde SOLO con este formato JSON: {"name": "...", "price": 0.0, "sku": "...", "category": "..."}`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64Image } }] }] })
                });
                const data = await response.json();
                const textResult = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                const result = JSON.parse(textResult);
                
                if(result.name) document.getElementById('new-name').value = result.name;
                if(result.price) document.getElementById('new-price').value = result.price;
                if(result.category) document.getElementById('new-category').value = result.category;
                
                // Si la IA encontró un SKU y no teníamos uno activo (o era manual genérico), lo actualizamos
                if(result.sku && (!activeCode || activeCode.startsWith('MAN-'))) {
                    activeCode = result.sku;
                    document.getElementById('form-sku-badge').innerText = activeCode;
                }
                
                showToast("Lectura Inteligente Exitosa");
            } catch (err) {
                console.error(err);
                showToast("IA: No se pudo interpretar el ticket");
            } finally {
                loading.classList.add('hidden');
            }
        }

        function saveProduct() {
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            const stock = document.getElementById('new-stock').value;
            const category = document.getElementById('new-category').value;

            if(!name || !price) return showToast("Faltan Nombre o Precio");

            const product = {
                sku: activeCode || "SKU-" + Date.now().toString().slice(-6),
                name,
                price: parseFloat(price),
                stock: parseInt(stock) || 0,
                category: category || 'General',
                image: activeImageData || (isEditing ? inventory.find(x => x.sku === activeCode).image : null),
                id: Date.now()
            };

            inventory = inventory.filter(p => p.sku !== product.sku);
            inventory.unshift(product);
            localStorage.setItem('kindo_pro_db', JSON.stringify(inventory));
            
            showToast(isEditing ? "Actualizado" : "Archivado");
            resetUI();
            showResult(product);
        }

        function deleteProductPrompt() {
            if(confirm("¿Eliminar este registro permanentemente?")) {
                inventory = inventory.filter(x => x.sku !== activeCode);
                localStorage.setItem('kindo_pro_db', JSON.stringify(inventory));
                showToast("Eliminado");
                resetUI();
            }
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            const query = document.getElementById('inventory-search').value.toLowerCase();
            const filtered = inventory.filter(p => p.name.toLowerCase().includes(query) || p.sku.toLowerCase().includes(query) || (p.category && p.category.toLowerCase().includes(query)));

            const totalValue = filtered.reduce((acc, p) => acc + (p.price * p.stock), 0);
            document.getElementById('inv-total-value').innerText = `VALOR TOTAL: $${totalValue.toFixed(2)}`;

            list.innerHTML = filtered.map(p => `
                <div onclick="openProduct('${p.sku}')" class="py-6 flex justify-between items-center active:bg-gray-50 transition-colors">
                    <div class="flex-1 min-w-0 pr-4">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-mono text-[8px] text-muted">${p.sku}</span>
                            <span class="text-[7px] border border-gray-100 px-1 font-bold uppercase">${p.category || 'General'}</span>
                        </div>
                        <h4 class="font-bold text-xs uppercase tracking-tight truncate">${p.name}</h4>
                        <p class="text-[9px] text-muted">Stock: ${p.stock}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-medium text-xs tracking-tighter">$${p.price.toFixed(2)}</p>
                        <p class="text-[8px] text-muted uppercase">Total: $${(p.price * p.stock).toFixed(2)}</p>
                    </div>
                </div>
            `).join('') || '<div class="py-20 text-center text-[9px] uppercase tracking-widest text-gray-300">Archivo vacío</div>';
            lucide.createIcons();
        }

        function exportCSV() {
            if(inventory.length === 0) return showToast("No hay datos");
            let csv = "SKU,Nombre,Categoria,Precio,Stock,ValorTotal\n";
            inventory.forEach(p => {
                csv += `${p.sku},"${p.name}","${p.category}",${p.price},${p.stock},${(p.price * p.stock).toFixed(2)}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', `inventario_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast("CSV Generado");
        }

        function toggleView() {
            const isScan = currentMode === 'scanner';
            document.getElementById('view-scanner').classList.toggle('hidden', isScan);
            document.getElementById('view-inventory').classList.toggle('hidden', !isScan);
            document.getElementById('nav-label').innerText = isScan ? 'Cámara' : 'Archivo';
            currentMode = isScan ? 'inventory' : 'scanner';
            if(currentMode === 'inventory') renderInventory();
            lucide.createIcons();
        }

        function openProduct(sku) { toggleView(); processCode(sku); }
        function hideAllPanels() {
            ['panel-default', 'panel-result', 'panel-form'].forEach(id => document.getElementById(id).classList.add('hidden'));
        }
        function resetUI() {
            activeCode = null; activeImageData = null; isEditing = false;
            hideAllPanels();
            document.getElementById('panel-default').classList.remove('hidden');
            ['manual-input', 'new-name', 'new-price', 'new-stock', 'new-category'].forEach(id => document.getElementById(id).value = '');
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-4'), 2500);
        }
        function startManualRegistration() { showForm(null, true); }
        window.onload = () => { lucide.createIcons(); };
    </script>
</body>
</html>
