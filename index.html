<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINDO | Cloud Inventory</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: '#ffffff',
                        content: '#000000',
                        muted: '#666666',
                        border: '#eeeeee',
                        accent: '#171717'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #ffffff; 
            color: #000000; 
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .scanner-container {
            position: relative;
            background: #000;
            overflow: hidden;
            border-bottom: 1px solid #eee;
        }

        #reader {
            width: 100% !important;
            border: none !important;
        }

        #reader video {
            object-fit: cover !important;
        }

        .input-minimal {
            border-bottom: 1px solid #e5e5e5;
            border-radius: 0;
            padding: 0.75rem 0;
            transition: all 0.2s;
            background: transparent;
        }
        .input-minimal:focus {
            border-color: #000000;
            outline: none;
            padding-left: 4px;
        }

        .btn-primary {
            @apply bg-black text-white font-bold py-4 text-[10px] uppercase tracking-widest transition-all active:scale-[0.98] disabled:bg-gray-400;
        }

        @media print {
            body * { visibility: hidden; }
            #print-area { 
                visibility: visible; 
                position: absolute; 
                left: 0; top: 0; 
                width: 58mm; 
                display: flex !important;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #eee; border-radius: 10px; }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-md mx-auto h-full flex flex-col relative bg-white shadow-2xl">
        
        <!-- Header -->
        <header class="px-6 py-6 flex items-center justify-between z-50 border-b border-gray-100 bg-white/90 backdrop-blur-md">
            <div>
                <h1 class="text-xl font-black tracking-tighter leading-none">KINDO®</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="sync-status" class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                    <p class="text-[9px] text-muted font-bold tracking-widest uppercase">Cloud Sync Active</p>
                </div>
            </div>
            <button onclick="toggleView()" class="flex items-center gap-2 px-4 py-2 bg-gray-50 rounded-full">
                <span id="nav-label" class="text-[10px] font-bold uppercase tracking-widest">Archivo</span>
                <i id="nav-icon" data-lucide="database" class="w-4 h-4"></i>
            </button>
        </header>

        <!-- Main -->
        <main class="flex-1 overflow-hidden relative flex flex-col">
            
            <!-- VIEW: SCANNER -->
            <section id="view-scanner" class="flex-1 flex flex-col overflow-y-auto">
                <div class="scanner-container shrink-0 h-72 relative flex items-center justify-center">
                    <div id="reader" class="absolute inset-0"></div>
                    <div id="cam-placeholder" class="z-10 text-center p-8">
                        <div class="mb-4 opacity-20"><i data-lucide="aperture" class="w-12 h-12 mx-auto"></i></div>
                        <button onclick="startScanner()" class="border-2 border-white text-white px-8 py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-white hover:text-black transition-all">
                            Inicializar Lente
                        </button>
                    </div>
                </div>

                <div class="px-8 py-8 flex-1 flex flex-col bg-white">
                    <!-- Default State -->
                    <div id="panel-default" class="space-y-8">
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold uppercase tracking-widest text-muted">Entrada Manual / SKU</label>
                            <div class="relative">
                                <input id="manual-input" type="text" placeholder="Escanea o escribe..." class="w-full input-minimal text-xl font-medium uppercase">
                                <button onclick="processCode(document.getElementById('manual-input').value)" class="absolute right-0 bottom-3 text-black">
                                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 gap-3">
                            <button onclick="startManualRegistration()" class="border border-gray-200 text-black text-[10px] font-bold py-4 uppercase tracking-widest flex items-center justify-center gap-2">
                                <i data-lucide="plus" class="w-3 h-3"></i> Nuevo Registro
                            </button>
                        </div>
                    </div>

                    <!-- Result Card -->
                    <div id="panel-result" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-300">
                        <div class="flex justify-between items-start">
                            <div class="space-y-1">
                                <span id="res-sku" class="font-mono text-[10px] text-white bg-black px-2 py-0.5">SKU: ---</span>
                                <h3 id="res-name" class="text-3xl font-black tracking-tighter uppercase leading-tight pt-2">Producto</h3>
                                <p id="res-category" class="text-[10px] font-bold uppercase text-muted tracking-widest">CATEGORIA</p>
                            </div>
                            <div class="w-24 h-24 border border-gray-100 p-1 bg-gray-50 flex items-center justify-center overflow-hidden rounded">
                                <img id="res-img" src="" class="w-full h-full object-cover hidden">
                                <div id="res-img-placeholder" class="text-gray-200"><i data-lucide="package" class="w-10 h-10"></i></div>
                            </div>
                        </div>

                        <div class="border-y border-gray-100 py-6 flex justify-between">
                            <div>
                                <label class="text-[8px] font-bold text-muted uppercase tracking-widest block mb-1">Precio Unitario</label>
                                <p id="res-price" class="text-4xl font-light tracking-tighter">$0.00</p>
                            </div>
                            <div class="text-right">
                                <label class="text-[8px] font-bold text-muted uppercase tracking-widest block mb-1">Stock Actual</label>
                                <p id="res-stock" class="text-4xl font-light tracking-tighter">0</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="window.print()" class="btn-primary flex items-center justify-center gap-2">
                                <i data-lucide="printer" class="w-3 h-3"></i> Imprimir
                            </button>
                            <button onclick="openEditMode()" class="border border-black text-black text-[10px] font-bold py-4 uppercase tracking-widest">Editar</button>
                        </div>
                        <button onclick="resetUI()" class="w-full text-[9px] font-bold text-muted uppercase tracking-widest hover:text-black">Cerrar Consulta</button>
                    </div>

                    <!-- Registration/Edit Form -->
                    <div id="panel-form" class="hidden space-y-6">
                        <div class="flex justify-between items-end">
                            <h3 id="form-title" class="text-lg font-black uppercase tracking-tighter">Nuevo Registro</h3>
                            <span id="form-sku-badge" class="font-mono text-[10px] bg-gray-100 px-2 py-1 uppercase">---</span>
                        </div>

                        <div class="space-y-5">
                            <input id="new-name" type="text" placeholder="Nombre Comercial del Artículo" class="w-full input-minimal text-lg font-bold">
                            <input id="new-category" type="text" placeholder="Categoría / Departamento" class="w-full input-minimal text-sm uppercase tracking-widest">
                            
                            <div class="grid grid-cols-2 gap-6">
                                <div>
                                    <label class="text-[9px] font-bold uppercase text-muted">Precio ($)</label>
                                    <input id="new-price" type="number" step="0.01" placeholder="0.00" class="w-full input-minimal text-xl font-mono">
                                </div>
                                <div>
                                    <label class="text-[9px] font-bold uppercase text-muted">Stock</label>
                                    <input id="new-stock" type="number" placeholder="0" class="w-full input-minimal text-xl font-mono text-center">
                                </div>
                            </div>

                            <div class="py-4">
                                <input type="file" id="new-image-input" accept="image/*" capture="environment" class="hidden" onchange="handleImageSelected(this)">
                                <button onclick="document.getElementById('new-image-input').click()" class="w-full border-2 border-dashed border-gray-200 py-6 rounded flex flex-col items-center gap-2 hover:border-black transition-colors">
                                    <i data-lucide="camera" class="w-6 h-6"></i>
                                    <span class="text-[9px] font-bold uppercase tracking-widest">Capturar Etiqueta (IA OCR)</span>
                                </button>
                                <div id="ai-loading" class="hidden mt-4 text-center">
                                    <div class="inline-block w-4 h-4 border-2 border-black border-t-transparent rounded-full animate-spin"></div>
                                    <p class="text-[8px] font-bold uppercase mt-2 tracking-widest">Analizando con Visión Artificial...</p>
                                </div>
                            </div>

                            <div class="flex gap-3 pt-4">
                                <button id="btn-save" onclick="saveProduct()" class="flex-1 btn-primary">Guardar en Nube</button>
                                <button onclick="resetUI()" class="px-6 border border-gray-200 text-[10px] font-bold uppercase">X</button>
                            </div>
                            <button id="btn-delete" onclick="deleteProductPrompt()" class="hidden w-full text-red-500 text-[9px] font-bold uppercase tracking-widest hover:underline">Eliminar Registro</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- VIEW: INVENTORY ARCHIVE -->
            <section id="view-inventory" class="hidden flex-1 flex flex-col bg-white overflow-hidden">
                <div class="px-8 pt-6 pb-6 border-b border-gray-100">
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <h2 class="text-3xl font-black tracking-tighter">ARCHIVO</h2>
                            <p id="inv-total-value" class="text-[10px] font-mono text-muted uppercase mt-1">Calculando valor...</p>
                        </div>
                        <button onclick="exportCSV()" class="p-2 bg-black text-white rounded"><i data-lucide="download" class="w-4 h-4"></i></button>
                    </div>
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-0 top-3 w-4 h-4 text-gray-300"></i>
                        <input id="inventory-search" type="text" placeholder="Buscar por nombre o SKU..." oninput="renderInventory()" class="w-full input-minimal pl-8 text-sm">
                    </div>
                </div>
                <div id="inventory-list" class="flex-1 overflow-y-auto divide-y divide-gray-50 px-8">
                    <!-- Items load here -->
                </div>
            </section>
        </main>

        <!-- Global Loader -->
        <div id="global-loader" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-[200] flex flex-col items-center justify-center">
            <div class="w-8 h-8 border-4 border-black border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] font-bold uppercase tracking-widest">Sincronizando...</p>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 z-[300] bg-black text-white px-8 py-4 text-[10px] font-bold tracking-widest uppercase opacity-0 translate-y-4 transition-all duration-300 pointer-events-none">
            Notification
        </div>
    </div>

    <!-- PRINT TEMPLATE (Hidden from UI) -->
    <div id="print-area" class="hidden">
        <div style="font-weight: 900; font-size: 16px; margin-bottom: 4px; letter-spacing: -1px;">KINDO® SYSTEM</div>
        <div style="font-size: 9px; margin-bottom: 12px; color: #666;">TERMINAL CLOUD V2.0</div>
        <div style="border-top: 2px solid black; border-bottom: 2px solid black; padding: 10px 0; width: 100%; margin-bottom: 12px;">
            <div id="p-name" style="font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px;">PRODUCT NAME</div>
            <div id="p-price" style="font-weight: 400; font-size: 28px; letter-spacing: -2px;">$0.00</div>
        </div>
        <div style="margin-bottom: 4px;"><svg id="p-barcode"></svg></div>
        <div id="p-sku" style="font-size: 10px; font-family: 'JetBrains Mono'; font-weight: 700;">SKU-000</div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Configuración Global ---
        const apiKey = ""; // API Key de Gemini (inyectada en runtime)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kindo-default';

        let user = null;
        let inventory = [];
        let html5QrCode = null;
        let activeCode = null;
        let activeImageData = null;
        let isEditing = false;
        let currentMode = 'scanner';

        // --- Autenticación ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error", err);
                showToast("Error de conexión");
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (u) {
                document.getElementById('sync-status').classList.replace('bg-red-500', 'bg-green-500');
                subscribeToInventory();
            } else {
                document.getElementById('sync-status').classList.replace('bg-green-500', 'bg-red-500');
            }
        });

        // --- Firestore Sync ---
        function subscribeToInventory() {
            if (!user) return;
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
            
            onSnapshot(q, (snapshot) => {
                inventory = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                if (currentMode === 'inventory') renderInventory();
                updateTotalValue();
            }, (error) => {
                console.error("Firestore Listen Error", error);
            });
        }

        function updateTotalValue() {
            const total = inventory.reduce((acc, p) => acc + (p.price * (p.stock || 0)), 0);
            document.getElementById('inv-total-value').innerText = `Valor en Stock: $${total.toLocaleString()}`;
        }

        // --- Escáner ---
        window.startScanner = async function() {
            try {
                html5QrCode = new Html5Qrcode("reader");
                const config = { 
                    fps: 25, 
                    qrbox: { width: 280, height: 160 },
                    aspectRatio: 1.0
                };
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                document.getElementById('cam-placeholder').classList.add('hidden');
                showToast("Sensor Óptico Listo");
            } catch (err) {
                showToast("No se detectó cámara");
            }
        };

        function onScanSuccess(code) {
            if (code === activeCode) return;
            if (navigator.vibrate) navigator.vibrate(50);
            processCode(code);
        }

        window.processCode = function(code) {
            if (!code) return;
            activeCode = code.trim().toUpperCase();
            const product = inventory.find(p => p.sku === activeCode);
            
            hideAllPanels();
            if (product) {
                showResult(product);
            } else {
                showForm(activeCode, false);
            }
        };

        // --- UI Logic ---
        function showResult(p) {
            activeCode = p.sku;
            document.getElementById('panel-result').classList.remove('hidden');
            document.getElementById('res-name').innerText = p.name;
            document.getElementById('res-price').innerText = `$${parseFloat(p.price).toFixed(2)}`;
            document.getElementById('res-sku').innerText = `SKU: ${p.sku}`;
            document.getElementById('res-stock').innerText = p.stock || '0';
            document.getElementById('res-category').innerText = p.category || 'GENERAL';
            
            const imgEl = document.getElementById('res-img');
            const placeholderEl = document.getElementById('res-img-placeholder');
            if (p.image) {
                imgEl.src = p.image;
                imgEl.classList.remove('hidden');
                placeholderEl.classList.add('hidden');
            } else {
                imgEl.classList.add('hidden');
                placeholderEl.classList.remove('hidden');
            }

            // Prep Print
            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-price').innerText = `$${parseFloat(p.price).toFixed(2)}`;
            document.getElementById('p-sku').innerText = p.sku;
            JsBarcode("#p-barcode", p.sku, { format: "CODE128", width: 2, height: 40, displayValue: false });
        }

        function showForm(code, manual = false) {
            isEditing = false;
            activeCode = code;
            hideAllPanels();
            document.getElementById('panel-form').classList.remove('hidden');
            document.getElementById('form-title').innerText = manual ? "Alta Manual" : "Registro Nuevo";
            document.getElementById('form-sku-badge').innerText = code || "PENDIENTE";
            document.getElementById('btn-delete').classList.add('hidden');
            
            // Limpiar campos si es nuevo
            ['new-name', 'new-price', 'new-stock', 'new-category'].forEach(id => document.getElementById(id).value = '');
        }

        window.openEditMode = function() {
            const p = inventory.find(x => x.sku === activeCode);
            if (!p) return;
            isEditing = true;
            hideAllPanels();
            document.getElementById('panel-form').classList.remove('hidden');
            document.getElementById('form-title').innerText = "Editar Item";
            document.getElementById('new-name').value = p.name;
            document.getElementById('new-price').value = p.price;
            document.getElementById('new-stock').value = p.stock;
            document.getElementById('new-category').value = p.category || '';
            document.getElementById('btn-delete').classList.remove('hidden');
        };

        // --- IA OCR ---
        window.handleImageSelected = async function(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    activeImageData = e.target.result;
                    const base64 = activeImageData.split(',')[1];
                    await analyzeWithAI(base64);
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        async function analyzeWithAI(base64Image) {
            const loader = document.getElementById('ai-loading');
            loader.classList.remove('hidden');
            
            const systemPrompt = "Eres un experto en lectura de etiquetas de inventario y tickets de venta. Extrae los datos con precisión quirúrgica.";
            const userPrompt = `Analiza esta imagen (puede estar rotada). Busca el NOMBRE del producto, el PRECIO unitario y cualquier código numérico que parezca un SKU o Código de Barras. Responde exclusivamente con un objeto JSON válido: {"name": string, "price": number, "sku": string, "category": string}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userPrompt }, { inlineData: { mimeType: "image/png", data: base64Image } }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);

                if (result.name) document.getElementById('new-name').value = result.name;
                if (result.price) document.getElementById('new-price').value = result.price;
                if (result.category) document.getElementById('new-category').value = result.category;
                if (result.sku && !activeCode) {
                    activeCode = result.sku.toUpperCase();
                    document.getElementById('form-sku-badge').innerText = activeCode;
                }
                showToast("IA: Datos extraídos");
            } catch (err) {
                console.error("AI Error", err);
                showToast("IA: No se pudo leer la imagen");
            } finally {
                loader.classList.add('hidden');
            }
        }

        // --- CRUD Operations ---
        window.saveProduct = async function() {
            if (!user) return showToast("Sin conexión");
            
            const name = document.getElementById('new-name').value;
            const price = parseFloat(document.getElementById('new-price').value);
            const stock = parseInt(document.getElementById('new-stock').value) || 0;
            const category = document.getElementById('new-category').value.toUpperCase();

            if (!name || isNaN(price)) return showToast("Nombre y Precio obligatorios");
            
            const skuFinal = activeCode || "MAN-" + Math.random().toString(36).substring(2, 8).toUpperCase();
            
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventory', skuFinal);
            
            const productData = {
                sku: skuFinal,
                name: name.trim(),
                price: price,
                stock: stock,
                category: category || 'GENERAL',
                updatedAt: new Date().toISOString()
            };

            // Solo actualizamos la imagen si se tomó una nueva
            if (activeImageData) productData.image = activeImageData;

            document.getElementById('global-loader').classList.remove('hidden');

            try {
                await setDoc(docRef, productData, { merge: true });
                showToast(isEditing ? "Actualizado" : "Guardado");
                resetUI();
                showResult(productData);
            } catch (err) {
                showToast("Error al guardar");
            } finally {
                document.getElementById('global-loader').classList.add('hidden');
            }
        };

        window.deleteProductPrompt = async function() {
            if (confirm(`¿Eliminar permanentemente ${activeCode}?`)) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventory', activeCode);
                try {
                    await deleteDoc(docRef);
                    showToast("Eliminado");
                    resetUI();
                } catch (err) {
                    showToast("Error al eliminar");
                }
            }
        };

        // --- Navegación y Archivo ---
        window.renderInventory = function() {
            const list = document.getElementById('inventory-list');
            const searchTerm = document.getElementById('inventory-search').value.toLowerCase();
            
            const filtered = inventory.filter(p => 
                p.name.toLowerCase().includes(searchTerm) || 
                p.sku.toLowerCase().includes(searchTerm) ||
                p.category?.toLowerCase().includes(searchTerm)
            );

            list.innerHTML = filtered.map(p => `
                <div onclick="openFromArchive('${p.sku}')" class="py-6 flex justify-between items-center active:bg-gray-50 transition-colors">
                    <div class="flex-1 min-w-0 pr-4">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-mono text-[9px] font-bold bg-black text-white px-1.5 uppercase">${p.sku}</span>
                            <span class="text-[8px] border border-gray-100 px-1 font-bold text-muted">${p.category || 'GENERAL'}</span>
                        </div>
                        <h4 class="font-bold text-sm uppercase tracking-tight truncate">${p.name}</h4>
                        <p class="text-[10px] text-muted">Stock: ${p.stock || 0} pzs</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-sm tracking-tighter">$${p.price.toFixed(2)}</p>
                        <p class="text-[9px] text-muted uppercase">Val: $${(p.price * (p.stock || 0)).toFixed(2)}</p>
                    </div>
                </div>
            `).join('') || '<div class="py-20 text-center text-[10px] uppercase tracking-widest text-gray-400">Sin resultados</div>';
        };

        window.openFromArchive = function(sku) {
            toggleView();
            processCode(sku);
        };

        window.toggleView = function() {
            const isScan = currentMode === 'scanner';
            document.getElementById('view-scanner').classList.toggle('hidden', isScan);
            document.getElementById('view-inventory').classList.toggle('hidden', !isScan);
            
            const navLabel = document.getElementById('nav-label');
            const navIcon = document.getElementById('nav-icon');
            
            if (isScan) {
                navLabel.innerText = 'Scanner';
                navIcon.setAttribute('data-lucide', 'camera');
                currentMode = 'inventory';
                renderInventory();
            } else {
                navLabel.innerText = 'Archivo';
                navIcon.setAttribute('data-lucide', 'database');
                currentMode = 'scanner';
            }
            lucide.createIcons();
        };

        window.resetUI = function() {
            activeCode = null;
            activeImageData = null;
            isEditing = false;
            hideAllPanels();
            document.getElementById('panel-default').classList.remove('hidden');
            ['manual-input', 'new-name', 'new-price', 'new-stock', 'new-category'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('manual-input').focus();
        };

        window.exportCSV = function() {
            if (inventory.length === 0) return showToast("Nada que exportar");
            let csv = "SKU,Nombre,Categoria,Precio,Stock,ValorTotal\n";
            inventory.forEach(p => {
                csv += `${p.sku},"${p.name}","${p.category}",${p.price},${p.stock},${(p.price * p.stock).toFixed(2)}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `KINDO_INV_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            showToast("Exportación Exitosa");
        };

        window.startManualRegistration = function() {
            showForm(null, true);
        };

        function hideAllPanels() {
            ['panel-default', 'panel-result', 'panel-form'].forEach(id => document.getElementById(id).classList.add('hidden'));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.replace('opacity-0', 'opacity-100');
            t.classList.replace('translate-y-4', 'translate-y-0');
            setTimeout(() => {
                t.classList.replace('opacity-100', 'opacity-0');
                t.classList.replace('translate-y-0', 'translate-y-4');
            }, 3000);
        }

        // Inicializar
        initAuth();
        lucide.createIcons();
    </script>
</body>
</html>
